<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Kamera {{ cam_id }} – Live-Stream</title>
    <!-- favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon/favicon-96x96.png') }}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon/favicon.svg') }}" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}" />
    <!-- favicon ende -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cam_view.css') }}">
  <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
</head>
<body>
  <h1>
    <span data-key="cam_view.camera_label">Kamera</span>
    {{ cam_id }}
    <span data-key="cam_view.live_stream_suffix">– Live-Stream</span>
  </h1>
  <div class="info">
    <span data-key="cam_view.paused_notice">Autodarts wurde für die Kamera-Feinjustierung vorübergehend angehalten.</span><br>
    <span data-key="cam_view.stream_url_label">Stream-URL:</span> {{ stream_url }}
  </div>
  <img src="{{ stream_url }}" alt="Kamera-Stream {{ cam_id }}">
</body>
</html>
